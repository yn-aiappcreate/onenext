# ツギイチ AI Proxy - Cloudflare Worker 設定
#
# ⚠️ 秘密鍵（OPENAI_API_KEY）はここに書かない。
#    wrangler secret put OPENAI_API_KEY で設定すること。

name = "tsugiichi-ai-proxy"
main = "src/index.js"
compatibility_date = "2024-01-01"

# 環境変数（非秘密）
[vars]
OPENAI_MODEL = "gpt-4o-mini"
MAX_INPUT_LENGTH = "2000"
RATE_LIMIT_PER_MINUTE = "10"

# M12: Server-side Pro verification
# アプリの Bundle ID（Apple JWS 検証で使用）
BUNDLE_ID = "com.ynlabs.tsugiichi"
# Pro サブスクリプションの Product ID
PRO_PRODUCT_ID = "com.ynlabs.tsugiichi.pro.monthly"

# KV Namespace for credit tracking (M11)
# ⠀⠀wrangler kv:namespace create CREDITS_KV ⠀で作成後、id を以下に貼る
[[kv_namespaces]]
binding = "CREDITS_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"         # wrangler kv:namespace create CREDITS_KV
preview_id = "REPLACE_WITH_PREVIEW_KV_ID"   # wrangler kv:namespace create CREDITS_KV --preview
