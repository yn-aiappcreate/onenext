name: iOS CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
      - name: Build & Test
        run: |
          xcodebuild -scheme DoNext -destination 'platform=iOS Simulator,name=iPhone 15' test | xcpretty
